---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "picard_collectmultiplemetrics"
description: Collect multiple metrics from a BAM file
keywords:
  - alignment
  - metrics
  - statistics
  - insert
  - quality
  - bam
tools:
  - "picard":
      description: |
        A set of command line tools (in Java) for manipulating high-throughput sequencing (HTS)
        data and formats such as SAM/BAM/CRAM and VCF.
      homepage: https://broadinstitute.github.io/picard/
      documentation: https://broadinstitute.github.io/picard/
      licence: ["MIT"]
      identifier: biotools:picard_tools

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`

    - bam:
        type: file
        description: BAM/CRAM/SAM file
        pattern: "*.{bam,cram,sam}"
    - bai:
        type: file
        description: BAM/CRAM/SAM file index
        pattern: "*.{bai,crai,sai}"
  - - ref_meta:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id: 'genome' ]
    - fasta:
        type: file
        description: FASTA reference file
        pattern: "*.{fasta,fa}"
  - - ref_meta1:
        type: map
        description: |
          Groovy Map containing reference information
          e.g. [ id: 'genome' ]
    - fai:
        type: file
        description: FASTA reference index file
        pattern: "*.fai"

output:
  - metrics:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.metrics.txt":
          type: file
          description: Alignment metrics files generated by picard
          pattern: "*.{metrics.txt}"
  - pdfs:
      - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.pdf":
          type: file
          description: PDF plots of metrics
          pattern: "*.{pdf}"
  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
          pattern: "versions.yml"

authors:
  - "@znorgaard"
maintainers:
  - "@znorgaard"
