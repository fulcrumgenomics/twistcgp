    - gnomADe_AF
    - gnomADe_AFR_AF
    - gnomADe_AMR_AF
    - gnomADe_ASJ_AF
    - gnomADe_EAS_AF
    - gnomADe_FIN_AF
    - gnomADe_MID_AF
    - gnomADe_NFE_AF
    - gnomADe_SAS_AF
    - gnomADg_AF
    - gnomADg_AFR_AF
    - gnomADg_AMI_AF
    - gnomADg_AMR_AF
    - gnomADg_ASJ_AF
    - gnomADg_EAS_AF
    - gnomADg_FIN_AF
    - gnomADg_MID_AF
    - gnomADg_NFE_AF
    - gnomADg_SAS_AF
  1k:
    - AF
    - AFR_AF
    - AMR_AF
