## pyTMB VEP configuration
## Defines how to parse VEP CSQ annotations for TMB calculation
##
## - tag/sep: VEP CSQ field identifier and multi-consequence separator
## - Annotation flags: classify VEP consequence terms (coding, non-coding, etc.)
## - polymDb: population frequency fields for germline filtering
##   Uses both gnomAD exome (--af_gnomade) and genome (--af_gnomadg) fields,
##   plus 1000 Genomes (--af_1kg)
## - cancerDb: somatic database fields (COSMIC via --custom)
## The pipeline also makes use of CIVIC (https://civicdb.org/welcome) but those annotations
## are not in the CSQ field and are handled separately
#################################################
## VEP

## Tags
tag: "CSQ"
sep: "|"

## Annotation flags
isCoding:
  1:
    - coding_sequence_variant
    - inframe_deletion
    - inframe_insertion
    - frameshift_variant
    - incomplete_terminal_codon_variant
    - missense_variant
    - splice_acceptor_variant
    - splice_donor_variant
    - splice_region_variant
    - start_lost
    - start_retained_variant
    - stop_retained_variant
    - stop_lost
    - stop_gained
    - synonymous_variant
    - transcript_ablation
    - transcript_amplification
    - coding_transcript_variant
    - protein_altering_variant

isNonCoding:
  1:
    - 5_prime_UTR_variant
    - 3_prime_UTR_variant
    - intergenic_variant
    - intron_variant
    - downstream_gene_variant
    - feature_elongation
    - feature_truncation
    - mature_miRNA_variant
    - non_coding_transcript_exon_variant
    - NMD_transcript_variant
    - non_coding_transcript_variant
    - regulatory_region_ablation
    - regulatory_region_amplification
    - regulatory_region_variant
    - TFBS_ablation
    - TFBS_amplification
    - TF_binding_site_variant
    - upstream_gene_variant

isSplicing:
  1:
    - splice_acceptor_variant
    - splice_donor_variant
    - splice_region_variant

isSynonymous:
  1:
    - synonymous_variant
    - start_retained_variant
    - stop_retained_variant

isNonSynonymous:
  1:
    - frameshift_variant
    - missense_variant
    - splice_acceptor_variant
    - splice_donor_variant
    - splice_region_variant
    - stop_gained
    - stop_lost
    - start_lost

