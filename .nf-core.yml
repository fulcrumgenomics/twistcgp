lint:
  files_exist:
    - .editorconfig
    - .github/.dockstore.yml
    - .github/CONTRIBUTING.md
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/ISSUE_TEMPLATE/feature_request.yml
    - .github/PULL_REQUEST_TEMPLATE.md
    - .github/workflows/branch.yml
    - .github/workflows/ci.yml
    - .github/workflows/linting.yml
    - .github/workflows/linting_comment.yml
    - .prettierignore
    - .prettierrc.yml
    - CHANGELOG.md
    - CITATIONS.md
    - CODE_OF_CONDUCT.md
    - LICENSE
    - assets/email_template.html
    - assets/email_template.txt
    - assets/nf-core-twistcgp_logo_light.png
    - assets/sendmail_template.txt
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - conf/test_full.config
    - docs/images/nf-core-twistcgp_logo_dark.png
    - docs/images/nf-core-twistcgp_logo_light.png
    - docs/output.md
    - docs/usage.md
  files_unchanged:
    - .github/.dockstore.yml
    - .github/CONTRIBUTING.md
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/ISSUE_TEMPLATE/feature_request.yml
    - .github/PULL_REQUEST_TEMPLATE.md
    - .github/workflows/branch.yml
    - .github/workflows/linting.yml
    - .github/workflows/linting_comment.yml
    - .prettierignore
    - CODE_OF_CONDUCT.md
    - LICENSE
    - assets/email_template.txt
    - assets/nf-core-twistcgp_logo_light.png
    - docs/README.md
    - docs/images/nf-core-twistcgp_logo_dark.png
    - docs/images/nf-core-twistcgp_logo_light.png
  included_configs: false
  multiqc_config:
    - report_comment
  nextflow_config: false
  readme:
    - nextflow_badge
nf_core_version: 3.3.2
repository_type: pipeline
template:
  author: Zach Norgaard
  description: a bioinformatics pipeline that...
  force: false
  is_nfcore: false
  name: twistcgp
  org: fulcrumgenomics
  outdir: .
  skip_features:
    - adaptivecard
    - changelog
    - ci
    - citations
    - codespaces
    - continuous_integration_testing
    - documentation
    - email
    - github
    - github_badges
    - gitpod
    - igenomes
    - license
    - nf_core_configs
    - rocrate
    - slackreport
    - vscode
  version: 1.0.0dev
